	
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Acompanhamento Pedagógico 2025</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Biblioteca para trabalhar com PDF se necessário (mantida do original) -->
  <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>

  <!-- ======== ESTILOS MODERNOS E RESPONSIVOS ======== -->
  <style>
    :root{
      --bg:#f7fafc;
      --card:#ffffff;
      --text:#233240;
      --muted:#6b7280;
      --accent-1:#bfe8ff; /* azul claro */
      --accent-2:#dff7ea; /* verde suave */
      --accent-3:#fff6d6; /* amarelo pastel */
      --accent-4:#ffeef6; /* rosa claro */
      --accent-5:#fff3e0; /* laranja claro */
      --primary:#2b6cb0;
      --success:#2f855a;
      --shadow: 0 6px 18px rgba(35,50,64,0.08);
      --radius:12px;
      --gap:14px;
    }

    html{scroll-behavior:smooth;}

    *{box-sizing:border-box;}

    body{
      margin:0;
      font-family: "Inter", "Segoe UI", Roboto, Arial, sans-serif;
      background:var(--bg);
      color:var(--text);
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
      line-height:1.45;
    }

    /* Cabeçalho fixo moderno */
    header.app-header{
      position:fixed;
      top:0;
      left:0;
      right:0;
      height:64px;
      background:linear-gradient(90deg,var(--card),#f8fbff);
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:8px 20px;
      box-shadow:0 4px 12px rgba(15,23,42,0.06);
      z-index:999;
      transition:box-shadow .35s, transform .25s;
    }
    header.app-header.highlight{
      box-shadow:0 10px 28px rgba(39,105,171,0.14);
      transform:translateY(-2px);
    }
    .brand{
      display:flex;
      align-items:center;
      gap:12px;
    }
    .brand h1{
      font-size:18px;
      margin:0;
      color:var(--primary);
      letter-spacing:0.2px;
    }
    .header-actions{
      display:flex;
      gap:10px;
      align-items:center;
    }
    .btn{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:10px 14px;
      border-radius:10px;
      border:none;
      background: linear-gradient(180deg,var(--success),#2b8a51);
      color:white;
      cursor:pointer;
      font-weight:600;
      box-shadow: var(--shadow);
      text-decoration:none;
    }
    .btn.ghost{
      background:transparent;
      color:var(--primary);
      border:1px solid rgba(43,108,176,0.08);
      box-shadow:none;
    }
    .btn:active{transform:translateY(1px);}

    /* Container do formulário (com espaço para o header fixo) */
    .container{
      max-width:1000px;
      margin:92px auto 40px;
      padding:20px;
    }

    /* Card principal */
    .card{
      background:var(--card);
      border-radius:var(--radius);
      padding:18px;
      box-shadow:var(--shadow);
    }

    h2.section-title{
      margin:0 0 10px 0;
      font-size:16px;
      color:var(--primary);
    }
    p.lead{
      margin:6px 0 18px 0;
      color:var(--muted);
      font-size:14px;
    }

    /* Accordion styles */
    .accordion{
      width:100%;
      background:transparent;
      border:0;
      padding:12px 14px;
      margin:10px 0;
      display:flex;
      align-items:center;
      justify-content:space-between;
      cursor:pointer;
      border-radius:12px;
      transition:background .2s, transform .15s;
    }
    .accordion:hover{ transform:translateY(-2px); }
    .accordion .left{
      display:flex;
      gap:12px;
      align-items:center;
    }
    .acc-icon{
      width:36px;
      height:36px;
      border-radius:10px;
      display:inline-grid;
      place-items:center;
      font-size:16px;
    }
    .acc-title{
      font-weight:700;
    }
    .acc-sub{
      display:block;
      font-size:12px;
      color:var(--muted);
    }
    .acc-arrow{
      transition:transform .25s;
    }

    .panel{
      overflow:hidden;
      max-height:0;
      transition:max-height .35s ease, padding .25s;
      padding:0 0;
    }
    .panel.open{
      padding:12px 0 18px 0;
    }

    /* Form grid */
    .form-row{
      display:grid;
      grid-template-columns:1fr;
      gap:10px;
      margin-bottom:10px;
    }
    label.field{
      display:block;
      font-size:13px;
      color:var(--text);
      margin-bottom:4px;
    }
    input[type="text"], select, textarea{
      width:100%;
      padding:10px 12px;
      border-radius:10px;
      border:1px solid rgba(15,23,42,0.08);
      outline:none;
      font-size:14px;
      background:linear-gradient(180deg,#fff,#fbfdff);
    }
    textarea{min-height:80px; resize:vertical;}

    /* Buttons area */
    .actions{
      display:flex;
      gap:10px;
      align-items:center;
      margin-top:14px;
    }

    /* WhatsApp button style */
    .whatsapp{
      background:linear-gradient(90deg,#25D366,#1DA851);
      padding:10px 12px;
      border-radius:10px;
      color:white;
      display:inline-flex;
      gap:8px;
      align-items:center;
      text-decoration:none;
      font-weight:700;
      box-shadow:0 8px 20px rgba(37,211,102,0.12);
    }

    /* Section accent backgrounds for header of each accordion */
    .accent-1{ background: linear-gradient(90deg,var(--accent-1),#e6f7ff); }
    .accent-2{ background: linear-gradient(90deg,var(--accent-2),#f0fff6); }
    .accent-3{ background: linear-gradient(90deg,var(--accent-3),#fffdf0); }
    .accent-4{ background: linear-gradient(90deg,var(--accent-4),#fff7fb); }
    .accent-5{ background: linear-gradient(90deg,var(--accent-5),#fff7ed); }

    /* Small screens adjustments */
    @media (min-width:700px){
      .form-grid-2{ display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    }
  
    /* Barra de progresso */
    .progress-container {
      width: 100%;
      background-color: #e0e0e0;
      border-radius: var(--radius);
      overflow: hidden;
      height: 18px;
      margin-bottom: 15px;
    }
    .progress-bar {
      height: 100%;
      background-color: var(--primary);
      width: 0%;
      color: white;
      font-size: 12px;
      text-align: center;
      line-height: 18px;
      transition: width 0.3s ease;
    }

</style>
</head>
<body>

  <!-- ========== CABEÇALHO FIXO ========== -->

    <div class="brand" aria-hidden="true">
      <!-- Pequeno ícone educativo (SVG) -->
      <svg width="38" height="38" viewBox="0 0 24 24" fill="none" aria-hidden="true">

  <!-- ========== CONTAINER PRINCIPAL ========== -->
  <main class="container" role="main">
    <div class="card" aria-live="polite">

      <p class="lead">Preencha as seções abaixo. Use o botão <strong>Gerar PDF</strong> quando finalizar.</p>

      <!-- Barra de Progresso -->
      <div class="progress-container">
        <div id="progressBar" class="progress-bar">0%</div>
      </div>

      <!-- ======== FORMULÁRIO (mantém todos os campos originais, organizados) ======== -->
      <form id="formulario" class="form-root" autocomplete="off">
        <!-- === Campos iniciais (professor / Turma / Turno) === -->
        <!-- Comentário: Esses campos são usados para identificar o PDF gerado e o compartilhamento no WhatsApp -->
          <div>
            <label class="field">Nome do Professor
              <input id="professor" name="professor" type="text" required placeholder="Digite o nome da professor">

          </div>
        		
		
		<button type="button" class="accordion accent-1" data-panel="secao1" aria-expanded="false" id="secao1Btn">

            <span class="acc-icon" aria-hidden="true"></span>

		    <div class="form-row"><br>
            <label class="field">Inserido</label>

		    <div class="form-row">

	          </div>
	
		<button type="button" class="accordion accent-1" data-panel="secao1" aria-expanded="false" id="secao1Btn">
          <div class="left">
            <span class="acc-icon" aria-hidden="true"></span>
            <div>
              <span class="acc-title">Frequências</span>
            </div>
          </div>
          <svg class="acc-arrow" width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">

		    <div class="form-row"><br>
            <label class="field">Frequência inserida até:</label>
            <input type="text" name="freq_ate">

		   <div class="form-row">

          </div>
		  
		  <button type="button" class="accordion accent-1" data-panel="secao1" aria-expanded="false" id="secao1Btn">
          <div class="left">
            <span class="acc-icon" aria-hidden="true"></span>
            <div>
              <span class="acc-title">Relatórios de objetivos de aprendizagem/habilidades:</span>
            </div>
          </div>
          <svg class="acc-arrow" width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M6 9l6 6 6-6" stroke="#2b6cb0" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
		  
		  
		  
          <div class="form-row"><br>
            <label class="field"></label>
            <select name="rel_obj">
              <option value="">Selecione</option>
              <option value="1">[1] 1º Bimestre</option>

		  <div class="form-row">
            <label class="field">Observações:</label>
            <input type="text" name="obs_2">
          </div>
		  
		  <button type="button" class="accordion accent-1" data-panel="secao1" aria-expanded="false" id="secao1Btn">
          <div class="left">
            <span class="acc-icon" aria-hidden="true"></span>
            <div>
              <span class="acc-title">Relatórios descritivos:</span>
            </div>
          </div>
          <svg class="acc-arrow" width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M6 9l6 6 6-6" stroke="#2b6cb0" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>

        </button>
		
		  
		  <div class="form-row"><br>
            <label class="field"></label>
            <select name="rel_des">
              <option value="">Selecione</option>

		   <div class="form-row">
            <label class="field">Observações:</label>
            <input type="text" name="obs_3">

		  <button type="button" class="accordion accent-1" data-panel="secao1" aria-expanded="false" id="secao1Btn">
          <div class="left">

              <span class="acc-title">Registros de aula</span>

		  </div>

          


        <!-- ========== AÇÕES FINAIS ========== -->
        <div class="actions" role="region" aria-label="Ações do formulário">
          <!-- Botão gerar PDF duplicado (pq header tem também) -->
          <button type="submit" id="btnGeneratePdf2" class="btn" title="Gerar PDF">
		  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true">

      </form>

    </div>
  </main>

  <!-- ======== SCRIPTS - comportamento do accordion, reset e whatsapp share ======== -->
  <script src="script.js"></script>	
  
  <script>
    /**
     * Script descritivo:
     * - Controla o comportamento do accordion (abrir/fechar com animação)
     * - Atualiza o link do WhatsApp com os dados principais (professor, turma, turno)
     * - Controla o botão "Novo Formulário" do header (reset + scroll suave + destaque)
     * - Fornece hooks para o botão Gerar PDF (atualmente placeholder)
     */

    document.addEventListener('DOMContentLoaded', function(){
      // ACCORDION: encontra todos os botões tipo accordion e liga o clique
      const accButtons = document.querySelectorAll('.accordion');
      accButtons.forEach(btn => {
        btn.addEventListener('click', function(){
          const panelId = this.getAttribute('data-panel');
          const panel = document.getElementById(panelId);
          const isOpen = panel.classList.contains('open');

          // fecha todos
          document.querySelectorAll('.panel').forEach(p => {
            p.classList.remove('open');
            p.style.maxHeight = null;
            p.setAttribute('aria-hidden','true');
          });
          document.querySelectorAll('.acc-arrow').forEach(a => a.style.transform = 'rotate(0deg)');

          if(!isOpen){
            // abre o selecionado
            panel.classList.add('open');
            panel.setAttribute('aria-hidden','false');
            panel.style.maxHeight = panel.scrollHeight + 'px';
            // gira a seta do botão clicado
            const arrow = this.querySelector('.acc-arrow');
            if(arrow) arrow.style.transform = 'rotate(180deg)';
          } else {
            panel.classList.remove('open');
            panel.setAttribute('aria-hidden','true');
            panel.style.maxHeight = null;
            const arrow = this.querySelector('.acc-arrow');
            if(arrow) arrow.style.transform = 'rotate(0deg)';
          }
        });
      });

      // Inicialmente abre a primeira seção para orientação
      const firstBtn = document.querySelector('.accordion[data-panel="secao1"]');
      if(firstBtn) firstBtn.click();

     /* // WHATSAPP: monta a mensagem com os campos principais
      const whatsappLink = document.getElementById('whatsapp-share');
      const professorInput = document.getElementById('Professor');
      const turmaInput = document.getElementById('turma');
      const turnoInput = document.getElementById('turno');

      function updateWhatsapp(){
        const professor = professorInput.value.trim() || '[Nome da professor]';
        const turma = turmaInput.value.trim() || '[Turma]';
        const turno = turnoInput.value.trim() || '[Turno]';
        const text = encodeURIComponent(`Acompanhamento Pedagógico\\nprofessor: ${professor}\\nTurma: ${turma}\\nTurno: ${turno}\\n(Resumo gerado pelo sistema)`);
        whatsappLink.href = `https://api.whatsapp.com/send?text=${text}`;
      }

      // atualiza ao digitar
      [professorInput, turmaInput, turnoInput].forEach(el => {
        el.addEventListener('input', updateWhatsapp);
      });
      updateWhatsapp();
*/
      // BOTÃO RESET no header: faz reset completo e rola para top com destaque
      const btnResetTop = document.getElementById('btnResetTop');
      const form = document.getElementById('formulario');
      const appHeader = document.getElementById('appHeader');

      function highlightHeader(){
        appHeader.classList.add('highlight');
        setTimeout(()=> appHeader.classList.remove('highlight'), 900);
      }

      btnResetTop.addEventListener('click', function(){
        form.reset();
       // updateWhatsapp();
        window.scrollTo({top:0, behavior:'smooth'});
        highlightHeader();
        // fecha painéis abertos
        document.querySelectorAll('.panel').forEach(p => {
          p.classList.remove('open');
          p.style.maxHeight = null;
          p.setAttribute('aria-hidden','true');
        });
      });

      // Botão Reset dentro do formulário (mantido para acessibilidade)
      const btnReset = document.getElementById('btnReset');
      btnReset.addEventListener('click', function(){
        // delay leve para garantir que o form reset aconteça
        setTimeout(()=> {
          updateWhatsapp();
          window.scrollTo({top:0, behavior:'smooth'});
          highlightHeader();
        }, 50);
      });

      // Botões Gerar PDF - hook para sua lógica de geração (placeholder)
      const btnGeneratePdf = document.getElementById('btnGeneratePdf');
      const btnGeneratePdf2 = document.getElementById('btnGeneratePdf2');

      function gerarPdfPlaceholder(){
        // Comentário: aqui você pode chamar sua rotina que usa pdf-lib (ou outra)
        // para preencher um template PDF, usando os valores do formulário.
        // Exemplo: coletar todos os campos e enviar para o servidor ou processar localmente.
        //alert('Botão Gerar PDF clicado. Aqui implemente a lógica de geração do PDF usando pdf-lib ou outra solução.');
		
      }

     // btnGeneratePdf.addEventListener('click', gerarPdfPlaceholder);
     // btnGeneratePdf2.addEventListener('click', gerarPdfPlaceholder);

      // Acessibilidade: permitir abrir/fechar com Enter/Space
      accButtons.forEach(btn => {
        btn.setAttribute('tabindex','0');
        btn.addEventListener('keydown', function(e){
          if(e.key === 'Enter' || e.key === ' '){
            e.preventDefault();
            this.click();
          }
        });
      });

    });
  </script>

</body>
</html>
